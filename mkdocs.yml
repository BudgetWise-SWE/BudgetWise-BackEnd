site_name: BudgetWise Backend
site_url: https://MuhammaddFouadd.github.io/BudgetWise-BackEnd/
site_description: Technical documentation for the BudgetWise financial management system.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: grey
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: grey
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables

nav:
  - Home: index.md
  - Installation: setup.md
  - System Architecture: architecture.md
  - Authentication: auth.md
  - Finance Modules:
      - Overview: finance/overview.md
      - Categories: finance/categories.md
      - Transactions: finance/transactions.md
      - Budgets: finance/budgets.md
  - Analytics & Reporting: analytics.md
  - Notification System: notifications.md
  - API Reference:
      - Accounts: reference/accounts.md
      - Finance: reference/finance.md
      - Analytics: reference/analytics.md
      - Planning: reference/planning.md
      - Notifications: reference/notifications.md
